version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cctv_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-cctv_user}
      POSTGRES_PASSWORD: ${DB_PASS:-StrongPassword123}
      POSTGRES_DB: ${DB_NAME:-cctv_platform}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./migrations/002_poc.sql:/docker-entrypoint-initdb.d/002_poc.sql
    networks:
      - cctv_network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.0
    container_name: cctv_mlflow
    restart: always
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri file:///mlflow/mlruns
      --default-artifact-root file:///mlflow/mlruns
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    networks:
      - cctv_network

  app:
    build: .
    container_name: cctv_app
    restart: always
    depends_on:
      - db
      - mlflow
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-cctv_user}
      - DB_PASS=${DB_PASS:-StrongPassword123}
      - DB_NAME=${DB_NAME:-cctv_platform}
      - PORT=8000
      - EVENT_CLIP_DIR=/app/event_clips
      - RECORDINGS_DIR=/app/recordings
      - CONTINUOUS_RECORDING_ENABLE=1
      - MOTION_ENABLE=1
      - LINGER_SECONDS=30
      - MLFLOW_ENABLE=${MLFLOW_ENABLE:-1}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_TRAINING=securevu-training
      - MLFLOW_EXPERIMENT_DEPLOYMENT=securevu-deployment
      - MLFLOW_MODEL_NAME=securevu-person-detector
    ports:
      - "8000:8000"
    volumes:
      - ./event_clips:/app/event_clips
      - ./recordings:/app/recordings
      - ./tracking:/app/tracking
      - ./models:/app/models
      - ./mlruns:/mlflow/mlruns
    networks:
      - cctv_network

networks:
  cctv_network:
    driver: bridge

volumes:
  postgres_data:
